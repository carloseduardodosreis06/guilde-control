<!DOCTYPE html>
<html lang="pt-BR">

</html>
<meta charset="USF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Guild Control</title>

<style>
 
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0d0018,#1b0030,#35005e);
    color:white;
}
.logo-container{
    width:450px;
    background:rgba(0,0,0,0,4);
    padding:35px;
    border-radius:20;
    box-shadow:0 0 30px rgba(153,0,255,.5);
    text-align:center;
}

.logo{
    font-size:42px;
    font-weight:bold;
    margin-bottom:20px;
}

.slogan{
    color:#c78cff;
    margin-bottom:20px;
}

.descricao{
    margin-bottom:25px;
    line-height:1.5;
}

input{ 
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
    background:#260040;
    color:#b8a4d9;
}

input::placeholder{
    color:#bbb;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#9d00ff;
    color:white;
    font-size:16px;
    transition:0.3s;
}

button:hover{
    background:#b73cff;
}

.planos{
    margin-top:25px;
}

.card{
    background:#190028;
    padding:12px;
    border-radius:10px;
    margin-top:10px;
}

.free{
    border-left:4px solod #777;
}

.plus{
    border-left:4px solid #ffcc00;
}

.pro{
    border-left:4px solod #9d00ff;
}

.instagram{
    margin-top:25px;
    color:#ff89ff;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="logo-container">
    <div class="logo">
        Guild Control    
    </div>

    <div class="slogan">
        Sua guilda. Seu comando. Sua vitoria. 
    </div>

    <div class="descricao">
        Gerencie membros, organize lines, acompanhe pontuações,horas jogadas e domine cada guerra de guilda.
    </div>

    <input type="email" placeholder="Digite seu email">

    <input type="password" placeholder="Digite sua senha">
