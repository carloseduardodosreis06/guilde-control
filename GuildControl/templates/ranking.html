<!DOCTYPE html>
<html long="pt-BR">

</head>

<meta charset="UTF-8"

<title>Membros</title>

<style>

body { 
  background: #060112; 
  color: white; 
  font-family: Arial, sans-serif; 
  margin: 0; 
  padding: 20px; 
  box-sizing: border-box; 
  height: 100vh; 
} 

h1 { 
  font-size: 24px; 
  margin-bottom: 20px; 
} 

/* Fundo escurecido que cobre a tela inteira */ 
.modal-overlay { 
  position: fixed; 
  top: 0; 
  left: 0; 
  width: 100%; 
  height: 100%; 
  background: rgba(0, 0, 0, 0.7); 
  display: flex; 
  justify-content: center; 
  align-items: center; 
  z-index: 1000; 
} 

/* Caixa flutuante centralizada (Pop-up) */ 
.card-modal { 
  background: #171d2e; 
  border-radius: 16px; 
  padding: 24px; 
  width: 90%; 
  max-width: 440px; 
  box-sizing: border-box; 
  position: relative; 
  box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.5); 
} 

h2 { 
  margin-top: 0; 
  margin-bottom: 24px; 
  font-size: 18px; 
  text-align: center; 
  font-weight: bold; 
  letter-spacing: 0.5px; 
} 

/* Botão de fechar ajustado para o canto do card */ 
.btn-close { 
  position: absolute; /* Mudado de fixed para absolute */
  top: -20px; /* Faz o botão flutuar na borda superior */
  right: -20px; /* Faz o botão flutuar na borda direita */
  width: 45px; /* Tamanho reduzido para harmonizar com o card */
  height: 45px; 
  border: none; 
  border-radius: 50%; 
  background: linear-gradient(135deg, #FFD700, #FF8C00); 
  color: white; 
  font-size: 22px; 
  font-weight: bold; 
  cursor: pointer; 
  box-shadow: 0 0 25px rgba(255,215,0,0.8); 
  transition: all 0.3s ease; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
} 

.btn-close:hover { 
  transform: scale(1.15) rotate(90deg); 
  box-shadow: 0 0 40px rgba(255,215,0,1); 
} 

.input-group { 
  margin-bottom: 16px; 
} 

label { 
  display: block; 
  font-size: 13px; 
  color: #94a3b8; 
  margin-bottom: 6px; 
  font-weight: 500; 
} 

/* Estilização padrão para inputs e selects */ 
input, select { 
  width: 100%; 
  padding: 12px 14px; 
  border: 1px solid #2a3447; 
  border-radius: 8px; 
  box-sizing: border-box; 
  background: #1e2638; 
  color: white; 
  font-size: 15px; 
  appearance: none; 
  -webkit-appearance: none; 
} 

/* Adiciona uma setinha personalizada para as caixas de seleção */ 
select { 
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://w3.org' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>"); 
  background-repeat: no-repeat; 
  background-position: right 14px center; 
  cursor: pointer; 
} 

input::placeholder { 
  color: #4b5563; 
} 

input:focus, select:focus { 
  outline: 1px solid #9d00ff; 
} 

/* Botão roxo de envio finalizado */ 
.btn-submit { 
  width: 100%; 
  padding: 14px; 
  background: #9d00ff; 
  color: white; 
  border: none; 
  border-radius: 8px; 
  font-size: 16px; 
  font-weight: bold; 
  cursor: pointer; 
  transition: background 0.2s ease, transform 0.1s ease; 
  margin-top: 8px; 
} 

.btn-submit:hover { 
  background: #8200e6; 
} 

.btn-submit:active { 
  transform: scale(0.98); 
}
