<!DOCTYPE html>
<html lang="pt_BR">

</html>

<meta charset="UTF-8">

<title>Guilda</title>

<style>

body{
    background:#0d0018;
    color:white;
    font-family:Arial;
    margin:0;
}

.container{
    padding:30px;
}

.card{
    background:#1b0030;
    border-radius:15px;
    padding:20px;
    margin-bottom:20px;
}

input{
    margin-top:15px;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
}

button{
    margin-top:15px;
    padding:12px;
    width:100%;
    background:#9d00ff;
    border:none;
    border-radius:10px;
    color:white;
    cursor:pointer;
}

.line{
    background:#260040;
    padding:15px;
    border-radius:10px;
    margin-top:10px;
}

</style>

</heard>

<body>

<div class="container">
  
<h1>Gerenciar Guilda</h1>

</div class="card">

<h2>Criar Guilda</h2>

<input type="text" placeholder="Nome da Gulda">

<button>Criar Guilda</button>

</div>

<div class="card">

<h2>Lines</h2>

<div class="line">Line 1 - 4 Jogadores</div>
<div class="line">Line 2 - 4 Jogadores</div>
<div class="line">Line 3 - 4 Jogadores</div>
<div class="line">Line 4 - 4 Jogadores</div>
<div class="line">Line 5 - 4 Jogadores</div>
<div class="line">Line 6 - 4 Jogadores</div>
<div class="line">Line 7 - 4 Jogadores</div>
<div class="line">Line 8 - 4 Jogadores</div>
<div class="line">Line 9 - 4 Jogadores</div>
<div class="line">Line 10 - 4 Jogadores</div>
</div>

</div>

</body>

</html>
